<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chat bubbles -->
  <circle cx="60" cy="80" r="30" fill="url(#emptyGrad)" opacity="0.5">
    <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="120" r="25" fill="url(#emptyGrad)" opacity="0.4">
    <animate attributeName="cy" values="120;110;120" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="150" r="35" fill="url(#emptyGrad)" opacity="0.3">
    <animate attributeName="cy" values="150;140;150" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- TVIN text -->
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0088cc" opacity="0.8">
    TVIN
  </text>
</svg>