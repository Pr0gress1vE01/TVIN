<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000040"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- T letter -->
  <rect x="35" y="25" width="30" height="6" rx="3" fill="white"/>
  <rect x="47" y="25" width="6" height="50" rx="3" fill="white"/>
  
  <!-- V letter -->
  <polygon points="25,75 50,35 75,75" fill="white" opacity="0.3"/>
  
  <!-- Chat bubbles -->
  <circle cx="30" cy="65" r="4" fill="white" opacity="0.8"/>
  <circle cx="45" cy="70" r="3" fill="white" opacity="0.6"/>
  <circle cx="60" cy="65" r="4" fill="white" opacity="0.8"/>
</svg>